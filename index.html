<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Thea 🤸">
<meta name="theme-color" content="#7B5FFF">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Thea's Gymnastics</title>
<link rel="stylesheet" href="css/design.css?v=2.3.2">
</head>
<body>

<!-- ═══ APP SHELL ═══ -->
<div id="app">


  <!-- Screen -->
  <div id="screen">

    <!-- Dashboard -->
    <div class="view active" id="view-home"></div>

    <!-- Competitions -->
    <div class="view" id="view-comps"></div>

    <!-- Training -->
    <div class="view" id="view-training"></div>

    <!-- Worlds -->
    <div class="view" id="view-worlds"></div>

    <!-- Achievements -->
    <div class="view" id="view-achievements"></div>

    <!-- Chat -->
    <div class="view" id="view-chat"></div>

    <!-- Gallery -->
    <div class="view" id="view-gallery"></div>

    <!-- AI Coach -->
    <div class="view" id="view-coach"></div>


  </div><!-- /screen -->

  <!-- Gymnast switcher (shown when parent/admin has multiple gymnasts) -->
  <div id="gymnast-switcher" style="display:none"></div>

  <!-- Tab bar -->
  <div id="tab-bar">
    <div class="tab-item active" id="tab-home" onclick="switchView('home')">
      <div class="tab-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10.707 2.293a1 1 0 0 1 1.414 0l9 9A1 1 0 0 1 20 13h-1v8a1 1 0 0 1-1 1h-4v-5h-4v5H6a1 1 0 0 1-1-1v-8H4a1 1 0 0 1-.707-1.707l9-9z"/>
        </svg>
      </div>
      <div class="tab-lbl">Home</div>
    </div>

    <div class="tab-item" id="tab-training" onclick="switchView('training')">
      <div class="tab-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="4" r="2.5"/>
          <path d="M15.5 8.5c.8.5 1.5 1.3 1.5 2.5v2a1 1 0 0 1-1 1h-2l1 5.5a1 1 0 0 1-2 .2L12 16l-1 3.7a1 1 0 0 1-2-.2L10 14H8a1 1 0 0 1-1-1V11c0-1.2.7-2 1.5-2.5L12 7l3.5 1.5z"/>
        </svg>
      </div>
      <div class="tab-lbl">Training</div>
    </div>

    <div class="tab-item tab-fab" id="tab-comps" onclick="switchView('comps')">
      <div class="tab-fab-btn">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="white">
          <path d="M5 3h14v5a7 7 0 0 1-14 0V3z"/>
          <path d="M3 3h2v5a5 5 0 0 0 .1.9A5 5 0 0 1 3 5V3zM21 3h-2v5a5 5 0 0 1-.1.9A5 5 0 0 0 21 5V3z"/>
          <rect x="10" y="15" width="4" height="4" rx="0.5"/>
          <rect x="7" y="19" width="10" height="2" rx="1"/>
        </svg>
      </div>
      <div class="tab-lbl">Comps</div>
    </div>

    <div class="tab-item" id="tab-chat" onclick="switchView('chat')">
      <div class="tab-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 2H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h3l3 3 3-3h7a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/>
        </svg>
      </div>
      <div class="tab-lbl">Chat</div>
    </div>

    <div class="tab-item" id="tab-more" onclick="openMoreMenu()">
      <div class="tab-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
        </svg>
      </div>
      <div class="tab-lbl">More</div>
    </div>
  </div>

  <!-- More menu sheet -->
  <div id="more-sheet-overlay" onclick="closeMoreMenu()" style="display:none;position:absolute;inset:0;z-index:200;background:rgba(45,27,105,0.3);">
    <div id="more-sheet" onclick="event.stopPropagation()" style="position:absolute;bottom:0;left:0;right:0;background:var(--white);border-radius:24px 24px 0 0;padding:12px 0 24px;">
      <div style="width:36px;height:4px;background:var(--purple-lt);border-radius:2px;margin:0 auto 16px;"></div>
      <div id="more-sheet-items"></div>
    </div>
  </div>

  <!-- Admin panel — sits above everything including tab bar -->
  <div class="admin-overlay" id="view-admin"></div>

</div><!-- /app -->

<!-- ═══ UPDATE BANNER ═══ -->
<div id="update-banner" style="display:none;position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
  background:#2D1B69;color:#fff;font-size:13px;font-weight:700;padding:11px 20px;border-radius:20px;
  z-index:9998;box-shadow:0 4px 20px rgba(45,27,105,0.4);display:none;align-items:center;gap:10px;white-space:nowrap;">
  🆕 Update available
  <button onclick="applyUpdate()" style="background:var(--gold);color:#2D1B69;border:none;border-radius:10px;
    padding:4px 12px;font-size:12px;font-weight:800;cursor:pointer;">Refresh</button>
</div>

<!-- ═══ AUTH OVERLAY ═══ -->
<div id="auth-overlay">
  <div id="auth-card">
    <div id="auth-body"></div>
  </div>
</div>

<!-- ═══ SHEETS ═══ -->

<!-- Add Competition Sheet -->
<div class="sheet-overlay" id="sheet-comp" onclick="closeSheetOnBg(event,'sheet-comp')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Add Competition</div>
    <div class="sheet-body"></div>
  </div>
</div>

<!-- Add Session Sheet -->
<div class="sheet-overlay" id="sheet-session" onclick="closeSheetOnBg(event,'sheet-session')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Log Training Session</div>
    <div class="sheet-body"></div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/util.js" crossorigin="anonymous"></script>
<script src="js/version.js?v=2.3.2"></script>
<script src="js/supabase.js?v=2.3.2"></script>
<script src="js/auth.js?v=2.3.2"></script>
<script src="js/data.js?v=2.3.2"></script>
<script src="js/app.js?v=2.3.2"></script>
<script src="js/views/auth.js?v=2.3.2"></script>
<script src="js/views/dashboard.js?v=2.3.2"></script>
<script src="js/views/competitions.js?v=2.3.2"></script>
<script src="js/views/training.js?v=2.3.2"></script>
<script src="js/views/worlds.js?v=2.3.2"></script>
<script src="js/views/achievements.js?v=2.3.2"></script>
<script src="js/views/admin.js?v=2.3.2"></script>
<script src="js/views/chat.js?v=2.3.2"></script>
<script src="js/views/coach.js?v=2.3.2"></script>
<script src="js/views/gallery.js?v=2.3.2"></script>
<script>
  function closeSheetOnBg(e, id) {
    if (e.target === e.currentTarget) closeSheet(id);
  }

  // ── Service worker registration & update detection ──
  let _swWaiting = null;
  // Skip service worker on localhost (dev) to avoid stale cache issues
  if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
    navigator.serviceWorker.register('sw.js').then(reg => {
      // New SW waiting to activate = update available
      if (reg.waiting) showUpdateBanner(reg.waiting);
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner(newSW);
          }
        });
      });
    });
    // When SW activates, reload to get the new version
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  }

  function showUpdateBanner(sw) {
    _swWaiting = sw;
    document.getElementById('update-banner').style.display = 'flex';
  }

  function applyUpdate() {
    if (_swWaiting) _swWaiting.postMessage({ type: 'SKIP_WAITING' });
  }

  appInit();
</script>
</body>
</html>
