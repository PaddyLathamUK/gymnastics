<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Thea 🤸">
<meta name="theme-color" content="#7B5FFF">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Thea's Gymnastics</title>
<link rel="stylesheet" href="css/design.css">
</head>
<body>

<!-- ═══ APP SHELL ═══ -->
<div id="app">

  <!-- Status bar -->
  <div id="status-bar">
    <span class="time" id="status-time">9:41</span>
    <div class="icons">
      <span>●●●●</span>
      <span>WiFi</span>
      <span>🔋</span>
    </div>
  </div>

  <!-- Screen -->
  <div id="screen">

    <!-- Dashboard -->
    <div class="view active" id="view-home"></div>

    <!-- Competitions -->
    <div class="view" id="view-comps"></div>

    <!-- Training -->
    <div class="view" id="view-training"></div>

    <!-- Worlds -->
    <div class="view" id="view-worlds"></div>

    <!-- Achievements -->
    <div class="view" id="view-achievements"></div>

    <!-- Chat -->
    <div class="view" id="view-chat"></div>

    <!-- Admin (slides over everything, not a tab) -->
    <div class="view admin-overlay" id="view-admin"></div>

  </div><!-- /screen -->

  <!-- Gymnast switcher (shown when parent/admin has multiple gymnasts) -->
  <div id="gymnast-switcher" style="display:none"></div>

  <!-- Tab bar -->
  <div id="tab-bar">
    <div class="tab-item active" id="tab-home" onclick="switchView('home')">
      <div class="tab-icon-wrap">🏠</div>
      <div class="tab-lbl">Home</div>
    </div>
    <div class="tab-item" id="tab-comps" onclick="switchView('comps')">
      <div class="tab-icon-wrap">📋</div>
      <div class="tab-lbl">Results</div>
    </div>
    <div class="tab-item tab-center" id="tab-worlds" onclick="switchView('worlds')">
      <div class="tab-center-btn">✈️</div>
      <div class="tab-lbl">Next Comp</div>
    </div>
    <div class="tab-item" id="tab-training" onclick="switchView('training')">
      <div class="tab-icon-wrap">🤸</div>
      <div class="tab-lbl">Training</div>
    </div>
    <div class="tab-item" id="tab-achievements" onclick="switchView('achievements')">
      <div class="tab-icon-wrap">👑</div>
      <div class="tab-lbl">Awards</div>
    </div>
    <div class="tab-item" id="tab-chat" onclick="switchView('chat')">
      <div class="tab-icon-wrap">💬</div>
      <div class="tab-lbl">Chat</div>
    </div>
  </div>

</div><!-- /app -->

<!-- ═══ UPDATE BANNER ═══ -->
<div id="update-banner" style="display:none;position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
  background:#2D1B69;color:#fff;font-size:13px;font-weight:700;padding:11px 20px;border-radius:20px;
  z-index:9998;box-shadow:0 4px 20px rgba(45,27,105,0.4);display:none;align-items:center;gap:10px;white-space:nowrap;">
  🆕 Update available
  <button onclick="applyUpdate()" style="background:var(--gold);color:#2D1B69;border:none;border-radius:10px;
    padding:4px 12px;font-size:12px;font-weight:800;cursor:pointer;">Refresh</button>
</div>

<!-- ═══ AUTH OVERLAY ═══ -->
<div id="auth-overlay">
  <div id="auth-card">
    <div id="auth-body"></div>
  </div>
</div>

<!-- ═══ SHEETS ═══ -->

<!-- Add Competition Sheet -->
<div class="sheet-overlay" id="sheet-comp" onclick="closeSheetOnBg(event,'sheet-comp')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Add Competition</div>
    <div class="sheet-body"></div>
  </div>
</div>

<!-- Add Session Sheet -->
<div class="sheet-overlay" id="sheet-session" onclick="closeSheetOnBg(event,'sheet-session')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Log Training Session</div>
    <div class="sheet-body"></div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/util.js" crossorigin="anonymous"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/views/auth.js"></script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/competitions.js"></script>
<script src="js/views/training.js"></script>
<script src="js/views/worlds.js"></script>
<script src="js/views/achievements.js"></script>
<script src="js/views/admin.js"></script>
<script src="js/views/chat.js"></script>
<script>
  function closeSheetOnBg(e, id) {
    if (e.target === e.currentTarget) closeSheet(id);
  }

  // ── Service worker registration & update detection ──
  let _swWaiting = null;
  // Skip service worker on localhost (dev) to avoid stale cache issues
  if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      // New SW waiting to activate = update available
      if (reg.waiting) showUpdateBanner(reg.waiting);
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner(newSW);
          }
        });
      });
    });
    // When SW activates, reload to get the new version
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  }

  function showUpdateBanner(sw) {
    _swWaiting = sw;
    document.getElementById('update-banner').style.display = 'flex';
  }

  function applyUpdate() {
    if (_swWaiting) _swWaiting.postMessage({ type: 'SKIP_WAITING' });
  }

  appInit();
</script>
</body>
</html>
